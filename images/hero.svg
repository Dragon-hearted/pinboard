<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow-0" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feFlood flood-color="#8B5CF6" flood-opacity="0.35" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="breathe-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feFlood flood-color="#8B5CF6" flood-opacity="0.25" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0s" fill="freeze" />
    <text x="400" y="60" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" filter="url(#glow-0)">Pinboard</text>
  </g>
  <line x1="340" y1="74" x2="460" y2="74" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.7" dur="0.6s" begin="0.3s" fill="freeze" />
  </line>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6s" fill="freeze" />
    <text x="400" y="107" text-anchor="middle" fill="#9CA3AF" font-family="Inter, system-ui, sans-serif" font-size="15">
      <tspan x="400" dy="0">Terminal-first reference board with built-in AI image generation</tspan>
    </text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.8s" fill="freeze" />
    <rect x="278" y="121" width="35" height="22" rx="11" fill="#10B98118" stroke="#10B981" stroke-width="1" />
    <text x="295.5" y="135.5" text-anchor="middle" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">tui</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9s" fill="freeze" />
    <rect x="321" y="121" width="29" height="22" rx="11" fill="#8B5CF618" stroke="#8B5CF6" stroke-width="1" />
    <text x="335.5" y="135.5" text-anchor="middle" fill="#8B5CF6" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">ai</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1s" fill="freeze" />
    <rect x="358" y="121" width="107" height="22" rx="11" fill="#10B98118" stroke="#10B981" stroke-width="1" />
    <text x="411.5" y="135.5" text-anchor="middle" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">image-generation</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze" />
    <rect x="473" y="121" width="49" height="22" rx="11" fill="#06B6D418" stroke="#06B6D4" stroke-width="1" />
    <text x="497.5" y="135.5" text-anchor="middle" fill="#06B6D4" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">visual</text>
  </g>
</svg>